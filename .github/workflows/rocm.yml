name: ROCm Backend

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_hardware:
        description: Run the AMD hardware contract lane on a registered self-hosted runner
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: rocm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: 1.95.0
  ROCM_IMAGE: rocm/dev-ubuntu-24.04:7.2.4

jobs:
  rocm-container:
    name: ROCm feature and adapterless contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out Hephaestus
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: hephaestus
          persist-credentials: false

      # The current Hephaestus development graph uses sibling path
      # dependencies. Keep CI's checkout topology identical to the supported
      # Atlas checkout rather than rewriting those dependencies for CI.
      - name: Check out Leto
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/leto
          path: leto
          persist-credentials: false

      - name: Check out Hermes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/hermes
          path: hermes
          persist-credentials: false

      - name: Check out Eunomia
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/eunomia
          path: eunomia
          persist-credentials: false

      - name: Check out Mnemosyne
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/Mnemosyne
          path: mnemosyne
          persist-credentials: false

      - name: Check out Moirai
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/Moirai
          path: moirai
          persist-credentials: false

      - name: Build and test in the AMD ROCm development image
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker pull "${ROCM_IMAGE}"; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "failed to pull ${ROCM_IMAGE} after ${attempt} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done
          docker run --rm --network host \
            --env "RUST_TOOLCHAIN=${RUST_TOOLCHAIN}" \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --workdir /workspace/hephaestus \
            "${ROCM_IMAGE}" \
            bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install --yes --no-install-recommends ca-certificates curl git build-essential pkg-config rocm-hip-runtime-dev
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
              . "$HOME/.cargo/env"
              rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
              rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"
              rustup toolchain install stable --profile minimal
              cargo +stable install cargo-nextest --locked
              # Hermes currently uses a sibling Eunomia path dependency after
              # its monorepo cutover. Patch the git source to the checked-out
              # workspace so path resolution remains valid in CI.
              mkdir -p /workspace/.cargo
              cat > /workspace/.cargo/config.toml <<"EOF"
              [patch."https://github.com/ryancinsight/hermes.git"]
              hermes-simd = { path = "/workspace/hermes/crates/hermes-simd" }
              hermes-simd-core = { path = "/workspace/hermes/crates/hermes-simd-core" }
              hermes-simd-intrinsics = { path = "/workspace/hermes/crates/hermes-simd-intrinsics" }
              hermes-simd-macros = { path = "/workspace/hermes/crates/hermes-simd-macros" }
              hermes-simd-types = { path = "/workspace/hermes/crates/hermes-simd-types" }
              EOF
              cargo "+$RUST_TOOLCHAIN" fmt --check
              # Hephaestus currently consumes sibling Atlas path crates while
              # their migration versions are unpublished. Resolve that
              # checkout-local graph once; every verification gate below then
              # runs against the generated lockfile with --locked.
              cargo "+$RUST_TOOLCHAIN" check --package hephaestus-rocm --no-default-features --all-targets
              cargo "+$RUST_TOOLCHAIN" check --package hephaestus-rocm --features rocm --all-targets
              cargo "+$RUST_TOOLCHAIN" clippy --package hephaestus-rocm --features rocm --all-targets --no-deps --locked -- -D warnings
              cargo "+$RUST_TOOLCHAIN" nextest run --package hephaestus-rocm --features rocm --locked
              cargo "+$RUST_TOOLCHAIN" test --package hephaestus-rocm --features rocm --doc --locked
              cargo "+$RUST_TOOLCHAIN" doc --package hephaestus-rocm --features rocm --no-deps --locked
            '

  rocm-hardware:
    name: AMD hardware contracts
    if: github.event_name == 'workflow_dispatch' && inputs.run_hardware
    runs-on: [self-hosted, linux, x64, rocm]
    timeout-minutes: 30
    steps:
      - name: Check out Hephaestus
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: hephaestus
          persist-credentials: false

      - name: Check out Leto
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/leto
          path: leto
          persist-credentials: false

      - name: Check out Mnemosyne
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/Mnemosyne
          path: mnemosyne
          persist-credentials: false

      - name: Check out Moirai
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ryancinsight/Moirai
          path: moirai
          persist-credentials: false

      - name: Inspect the AMD runtime
        shell: bash
        run: |
          set -euo pipefail
          hipconfig --version
          rocminfo

      - name: Install the pinned Rust toolchain and nextest
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Install nextest
        shell: bash
        run: cargo install cargo-nextest --locked

      - name: Run required-device contracts
        working-directory: hephaestus
        env:
          HEPHAESTUS_ROCM_REQUIRE_DEVICE: "1"
        run: cargo nextest run --package hephaestus-rocm --features rocm --locked
