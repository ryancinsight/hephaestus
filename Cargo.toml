[workspace]
resolver = "2"
members = [
    "crates/hephaestus-core",
    "crates/hephaestus-wgpu",
]

[workspace.package]
version = "0.7.1"
edition = "2021"
authors = ["Ryan Clanton <ryanclanton@outlook.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/ryancinsight/hephaestus.git"

[workspace.dependencies]
# ── Local Workspace Crates ──
hephaestus-core = { path = "crates/hephaestus-core" }

# ── GPU ──
# wgpu 26 matches apollo (the first consumer). coeus re-bases when it bumps
# from wgpu 23; the CUDA backend (cuda-oxide + cutile composed, per atlas
# ADR 0001) lands as a sibling crate.
wgpu = { version = "26.0", features = ["wgsl"] }
pollster = "0.3"

# ── Foundations ──
bytemuck = { version = "1.19", features = ["derive"] }
thiserror = "2.0"
# leto host-side layout metadata (shape/strides/offset + broadcast) reused as
# the backend-agnostic indexing vocabulary per atlas ADR 0001. Layout/array
# types only — no CPU compute dependency (leto-ops is not pulled).
leto = { git = "https://github.com/ryancinsight/leto.git", rev = "320960ec7b99b8a4fdfe6d3974de03543b167ff9", default-features = false, features = ["std"] }
# themis placement/topology law (atlas ADR 0002): hephaestus is the provider
# that reports device properties into themis GpuTopology snapshots.
themis = { git = "https://github.com/ryancinsight/themis", rev = "bdcddfe294f941ef2f84fd4ce38537906b0fec23", default-features = false, features = ["std"] }
